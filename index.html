<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skull King Card Game</title>
  <link rel="stylesheet" href="css/game-flow.css">
</head>
<body>
  <div id="app" class="game-container">
    <!-- Game Flow Section -->
    <section class="game-flow" aria-labelledby="game-status">
      <div class="game-header">
        <h1 id="game-status" class="game-title">Skull King</h1>
        
        <!-- Phase Indicator -->
        <div class="phase-indicator" aria-label="Current game phase">
          <div class="phase-display">
            <span class="phase-label">Current Phase:</span>
            <span class="phase-badge" id="currentPhase" data-phase="setup">Setup</span>
          </div>
        </div>
        
        <!-- Round Counter -->
        <div class="round-counter" aria-label="Round progress">
          <span class="round-label">Round:</span>
          <span class="round-number"><span id="currentRound">0</span> of 10</span>
        </div>
      </div>
      
      <!-- Phase Transition Button -->
      <div class="button-container">
        <button 
          id="nextPhaseBtn" 
          class="btn btn-primary" 
          aria-label="Progress to next phase"
          data-action="start-bidding"
        >
          Start Bidding
        </button>
      </div>
    </section>
    
    <!-- Game Completion Modal -->
    <div id="gameOverModal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="gameOverTitle">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="gameOverTitle" class="modal-title">Game Over</h2>
        </div>
        
        <div class="modal-body">
          <div class="winner-section" id="winnerSection">
            <p class="winner-text">Congratulations, <span id="winnerName" class="winner-name">Player 1</span>!</p>
            <p class="winner-subtitle">You won the game!</p>
          </div>
          
          <div class="final-scores" id="finalScores" aria-label="Final game scores">
            <h3 class="scores-title">Final Scores</h3>
            <ul class="scores-list">
              <!-- Scores populated dynamically -->
            </ul>
          </div>
        </div>
        
        <div class="modal-footer">
          <button 
            id="playAgainBtn" 
            class="btn btn-primary" 
            aria-label="Start a new game"
          >
            Play Again
          </button>
          <button 
            id="exitGameBtn" 
            class="btn btn-secondary" 
            aria-label="Exit to main menu"
          >
            Exit to Menu
          </button>
        </div>
      </div>
      <div class="modal-overlay" id="gameOverOverlay"></div>
    </div>
  </div>
</body>
</html>
