<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull King - Card Game</title>
    <link rel="stylesheet" href="css/game-flow.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header with Game Title -->
        <header class="game-header">
            <h1>Skull King</h1>
        </header>

        <!-- Game Flow Section -->
        <section class="game-flow-section">
            <!-- Phase Indicator -->
            <div class="phase-indicator" id="phaseIndicator">
                <h2>Current Phase</h2>
                <div class="phase-display">
                    <span id="currentPhase" class="phase-badge phase-setup">Setup</span>
                </div>
                <p class="phase-description" id="phaseDescription">Preparing the game...</p>
            </div>

            <!-- Round Counter -->
            <div class="round-counter" id="roundCounter">
                <h3>Progress</h3>
                <div class="round-display">
                    <span id="roundNumber" class="round-number">1</span>
                    <span class="round-separator">/</span>
                    <span class="round-total">10</span>
                </div>
                <p class="round-label">Round</p>
                <div class="round-progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 10%;"></div>
                </div>
            </div>

            <!-- Phase Transition Button -->
            <div class="phase-action">
                <button id="nextPhaseButton" class="btn btn-primary" aria-label="Advance to next phase">
                    Start Bidding
                </button>
            </div>
        </section>

        <!-- Main Game Area -->
        <main class="game-area">
            <section class="players-section" id="playersSection">
                <!-- Player cards will be rendered here -->
                <div class="players-grid" id="playersGrid"></div>
            </section>

            <section class="cards-section" id="cardsSection">
                <!-- Game cards will be rendered here -->
                <div class="cards-area" id="cardsArea"></div>
            </section>
        </main>

        <!-- Game Completion Modal -->
        <div id="gameOverModal" class="modal" style="display: none;">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Game Complete!</h2>
                    <button class="modal-close" id="closeModal" aria-label="Close modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="winner-section">
                        <h3 id="winnerName">Winner</h3>
                        <p class="winner-score" id="winnerScore">Score: 0</p>
                    </div>
                    <div class="final-scores" id="finalScores">
                        <h4>Final Scores</h4>
                        <ul class="scores-list" id="scoresList">
                            <!-- Scores will be populated here -->
                        </ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="playAgainButton" class="btn btn-primary">Play Again</button>
                    <button id="exitGameButton" class="btn btn-secondary">Exit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game-state.js"></script>
    <script src="js/game-flow-controller.js"></script>
</body>
</html>
